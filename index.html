<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bad Company Records</title>

    <link rel="icon" type="image/x-icon" href="channels4_profile.jpg">

    <style>

        body {

            background: #000;

            color: #fff;

            font-family: 'Courier New', Courier, monospace;

            text-align: center;

            margin: 0;

            padding: 50px 20px;

            display: flex;

            flex-direction: column;

            align-items: center;

            min-height: 100vh;

            box-sizing: border-box;

        }

        .main-logo {

            width: 100%;

            max-width: 320px;

            height: auto;

            margin-bottom: 30px;

        }

        /* Mission Statement */

        .mission {

            max-width: 600px;

            margin-bottom: 50px;

            padding: 0 20px;

        }

        .mission h2 {

            font-size: 0.8rem;

            letter-spacing: 4px;

            color: #666;

            text-transform: uppercase;

            margin-bottom: 15px;

        }

        .mission p {

            font-size: 1.2rem;

            line-height: 1.6;

            margin: 0;

            text-transform: uppercase;

        }

        /* Contact Section */

        .contact-box {

            border-top: 1px solid #222;

            padding-top: 30px;

            width: 100%;

            max-width: 450px;

        }

        .contact-box h3 {

            font-size: 0.9rem;

            letter-spacing: 2px;

            margin-bottom: 15px;

            color: #fff;

        }

        .contact-box p {

            font-size: 1rem;

            color: #888;

            margin-bottom: 20px;

        }

        .contact-link {

            color: #fff;

            text-decoration: none;

            border: 1px solid #fff;

            padding: 10px 20px;

            display: inline-block;

            transition: 0.3s;

            font-size: 0.8rem;

            letter-spacing: 1px;

        }

        .contact-link:hover {

            background: #fff;

            color: #000;

        }

        /* Footer */

        footer {

            margin-top: auto;

            padding: 40px 0 0 0;

            font-size: 0.7rem;

            color: #444;

            letter-spacing: 2px;

        }

    </style>

</head>

<body>



    <img src="channels4_profile.jpg" alt="Bad Company Records Logo" class="main-logo">



    <div class="mission">

        <h2>Our Mission</h2>

        <p>

            We are a company bringing 90s flavor into the modern era. <br>

            We remaster, remix, and make new music for the world. <br>

            Stay Gangsta.

        </p>

    </div>



    <div class="contact-box">

        <h3>Business & Inquiries</h3>

        <p>For feature requests, leak reports, or engineering:</p>

        <a href="mailto:badcompanyrecords@gmail.com" class="contact-link">Contact via Email</a>

    </div>



    <footer>

        © 2026 BAD COMPANY RECORDS // QUEENS, NY

    </footer>
</body>

</html>
